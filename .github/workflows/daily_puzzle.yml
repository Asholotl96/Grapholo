name: Generate Daily Puzzle

on:
  schedule:
    - cron: '12 21 * * *' # Runs every night at 23:59 UTC
  workflow_dispatch: # Allows manual trigger anytime from GitHub Actions tab

jobs:
  generate-puzzle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary schedule

      - name: Run puzzle generator script
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python math-engine/generate_puzzles.py
